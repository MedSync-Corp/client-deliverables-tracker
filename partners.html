<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sales Partners</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50">
  <app-navbar></app-navbar>

  <main class="mx-auto max-w-7xl p-6 space-y-6">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">Sales Partners</h1>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 overflow-x-auto" id="partnersTabsWrap">
      <button data-partner="__all__"
              class="px-3 py-1.5 rounded-lg border text-sm bg-white">
        All partners
      </button>
      <div id="partnersTabs" class="flex gap-2"></div>
    </div>

    <!-- Table -->
    <section class="space-y-2">
      <div class="bg-white rounded-xl shadow">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-2 text-left text-xs font-semibold text-gray-600">Client</th>
              <th class="px-4 py-2 text-left text-xs font-semibold text-gray-600">Completed this week</th>
              <th class="px-4 py-2 text-left text-xs font-semibold text-gray-600">Total completed</th>
            </tr>
          </thead>
          <tbody id="partnersBody" class="divide-y divide-gray-100 bg-white"></tbody>
        </table>
      </div>
    </section>

    <!-- PDF Report Generation -->
    <section class="bg-white rounded-xl shadow p-5 space-y-4">
      <h2 class="text-lg font-semibold">Generate Partner Report</h2>

      <!-- Partner Selection -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Partner</label>
        <select id="reportPartnerSelect" class="w-full sm:w-64 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-200">
          <option value="">Select a partner...</option>
        </select>
      </div>

      <!-- Client Selection (shown after partner selected) -->
      <div id="clientSelectionWrap" class="hidden">
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm text-gray-600">Select Clients to Include</label>
          <div class="flex gap-2">
            <button type="button" id="btnSelectAll" class="text-xs px-2 py-1 rounded border hover:bg-gray-50">Select All</button>
            <button type="button" id="btnDeselectAll" class="text-xs px-2 py-1 rounded border hover:bg-gray-50">Deselect All</button>
          </div>
        </div>
        <div id="clientChecklistWrap" class="border rounded-lg max-h-48 overflow-y-auto bg-gray-50">
          <div id="clientChecklist" class="p-2 space-y-1"></div>
        </div>
        <p id="clientSelectionCount" class="text-xs text-gray-500 mt-1">0 of 0 clients selected</p>
      </div>

      <!-- Report Type, Options, and Generate Button -->
      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
        <div>
          <label class="block text-sm text-gray-600 mb-1">Report Type</label>
          <select id="reportTypeSelect" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-200">
            <option value="">Select report type...</option>
            <option value="2025">2025 Completions</option>
            <option value="2026ytd">2026 YTD</option>
            <option value="combined">2025 & 2026 YTD Combined</option>
            <option value="total">Total Complete Only</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Options</label>
          <div class="flex flex-col gap-1">
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" id="reportIncludeStatus" class="rounded text-purple-600 focus:ring-purple-500" checked />
              <span>Include Status Column</span>
            </label>
          </div>
        </div>
        <div class="flex gap-2">
          <button id="btnGeneratePDF" class="flex-1 px-4 py-2 rounded-lg text-white font-medium hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed" style="background: linear-gradient(135deg, #7030a0 0%, #3656b8 50%, #01a7cb 100%);">
            Generate PDF
          </button>
          <button id="btnGenerateXLSX" class="flex-1 px-4 py-2 rounded-lg text-white font-medium hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed" style="background: linear-gradient(135deg, #7030a0 0%, #3656b8 50%, #01a7cb 100%);">
            Generate Spreadsheet
          </button>
        </div>
        <div id="reportValidation" class="text-sm text-red-600 hidden"></div>
      </div>
    </section>
  </main>

  <!-- Add/Edit Client Modal (for quick edits from partner report) -->
  <div id="clientModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl max-h-[85vh] overflow-y-auto w-full max-w-3xl">
      <div class="p-5 border-b flex items-center justify-between">
        <h3 id="clientModalTitle" class="text-lg font-semibold">Edit Client</h3>
        <button id="clientModalClose" class="text-gray-500 hover:text-gray-700">&times;</button>
      </div>
      <form id="clientForm" class="p-5 space-y-6">
        <input type="hidden" name="client_id" />
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">Client name</label>
            <input name="name" class="w-full border rounded-lg px-3 py-2" required />
          </div>
          <div>
            <label class="block text-sm mb-1">Acronym</label>
            <input name="acronym" class="w-full border rounded-lg px-3 py-2" placeholder="e.g., ACME" />
          </div>
          <div>
            <label class="block text-sm mb-1">Reported Lives (total patient population)</label>
            <input name="reported_lives" type="number" step="1" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div>
            <label class="block text-sm mb-1">Total lives</label>
            <input name="total_lives" type="number" step="1" class="w-full border rounded-lg px-3 py-2" />
            <p class="text-xs text-gray-500 mt-1">RECAP-eligible population</p>
          </div>
          <div>
            <label class="block text-sm mb-1">First Roster Received</label>
            <input name="first_roster_date" type="date" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div class="flex items-center gap-3 pt-6">
            <input type="checkbox" name="ehr_access" id="ehr_access" class="rounded text-purple-600 focus:ring-purple-500" />
            <label for="ehr_access" class="text-sm">EHR Access Granted</label>
          </div>
          <div>
            <label class="block text-sm mb-1">Contact name</label>
            <input name="contact_name" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div>
            <label class="block text-sm mb-1">Contact email</label>
            <input name="contact_email" type="email" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm mb-1">Sales partner</label>
            <input name="sales_partner" list="partnerList" class="w-full border rounded-lg px-3 py-2" />
            <datalist id="partnerList"></datalist>
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm mb-1">Instructions / notes</label>
            <textarea name="instructions" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
          </div>
        </div>

        <!-- Baseline commitment -->
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">Baseline weekly commitment</label>
            <input id="weekly_qty" name="weekly_qty" type="number" step="1" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div>
            <label class="block text-sm mb-1">Start week (Monday)</label>
            <input id="start_week" name="start_week" type="date" class="w-full border rounded-lg px-3 py-2" />
          </div>
        </div>

        <!-- Addresses (simplified) -->
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <h4 class="font-semibold">Addresses</h4>
            <button id="btnAddAddr" type="button" class="text-sm px-2 py-1 rounded border">+ Add</button>
          </div>
          <div id="addressesList" class="space-y-3"></div>
          <template id="addrRowTpl">
            <div class="grid sm:grid-cols-5 gap-2 items-start">
              <input name="line1" placeholder="Line 1" class="border rounded-lg px-3 py-2" />
              <input name="line2" placeholder="Line 2" class="border rounded-lg px-3 py-2" />
              <input name="city" placeholder="City" class="border rounded-lg px-3 py-2" />
              <input name="state" placeholder="State" class="border rounded-lg px-3 py-2" />
              <div class="flex gap-2">
                <input name="zip" placeholder="ZIP" class="border rounded-lg px-3 py-2 w-full" />
                <button type="button" class="remove px-2 py-2 rounded border">x</button>
              </div>
            </div>
          </template>
        </div>

        <!-- EMRs -->
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <h4 class="font-semibold">EMR Systems</h4>
            <button id="btnAddEmr" type="button" class="text-sm px-2 py-1 rounded border">+ Add</button>
          </div>
          <div id="emrsList" class="space-y-3"></div>
          <template id="emrRowTpl">
            <div class="grid sm:grid-cols-3 gap-2 items-start">
              <input name="vendor" placeholder="Vendor" class="border rounded-lg px-3 py-2" />
              <input name="details" placeholder="Details" class="border rounded-lg px-3 py-2" />
              <div class="flex justify-end">
                <button type="button" class="remove px-2 py-2 rounded border">x</button>
              </div>
            </div>
          </template>
        </div>

        <div class="flex items-center justify-end gap-2">
          <button type="button" id="clientCancel" class="px-3 py-2 rounded border">Cancel</button>
          <button type="submit" class="px-3 py-2 rounded bg-gray-900 text-white">Save</button>
        </div>
      </form>
    </div>
  </div>

  <app-footer></app-footer>

  <!-- Modules -->
  <script type="module" src="./env.js"></script>
  <script type="module" src="./supabaseClient.js"></script>
  <script type="module" src="./auth.js"></script>
  <script type="module" src="./toast.js"></script>
  <script type="module" src="./navbar.js"></script>
  <script type="module" src="./footer.js"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
